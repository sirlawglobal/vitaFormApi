version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: vitaform-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: vitaform
      MONGO_INITDB_ROOT_PASSWORD: vitaform_secret
      MONGO_INITDB_DATABASE: vitaform
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - vitaform-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: vitaform-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - vitaform-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Commander (dev GUI) ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: vitaform-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - vitaform-net
    profiles:
      - tools  # Only starts with: docker compose --profile tools up

volumes:
  mongodb_data:
  redis_data:

networks:
  vitaform-net:
    driver: bridge
